<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Seat Booking</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="movie-container">
      <label for="movie">Välj film:</label>
      <select id="movie"></select>
    </div>

    <ul class="showcase">
      <li>
        <div class="seat"></div>
        <small>Ledig</small>
      </li>
      <li>
        <div class="seat selected"></div>
        <small>Vald</small>
      </li>
      <li>
        <div class="seat occupied"></div>
        <small>Upptagen</small>
      </li>
    </ul>

    <div class="container" id="seat-container">
      <div class="screen"></div>

      <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
      </div>

      <div class="row">
        <div class="seat"></div>
        <div class="seat selected"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
      </div>

      <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
      </div>
    </div>

    <p class="text">
      Du har valt <span id="count">0</span> säten för priset
      <span id="total">0</span> kr
    </p>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
